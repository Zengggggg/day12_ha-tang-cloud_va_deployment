version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vinfast-route-planner-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-alpine
    container_name: vinfast-route-planner-frontend
    working_dir: /web
    volumes:
      - ./frontend:/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - api
